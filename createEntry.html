<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Entry - Time Tracker</title>
    <link rel="stylesheet" href="./css/createEntry.css">
</head>
<body>
    <aside class="sidebar">
        <nav>
            <a href="./dashboard.html">Dashboard</a>
            <a href="./timeEntries.html">Time Entries</a>
            <a href="./projects.html">Projects</a>
            <a href="./settings.html">Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div class="header-title">
                <span class="clock-icon">⏰</span>
                <h1>Time Tracking</h1>
            </div>
            <div class="user-info">Logged in as User</div>
        </header>

        <section class="form-card">
            <h2>Create New Entry</h2>
            <form id="entryForm">
                <label for="project">Project Name:</label>
                <input type="text" id="project" name="project" required>

                <label for="task">Task Name:</label>
                <input type="text" id="task" name="task" required>

                <label for="hours">Hours:</label>
                <input type="number" id="hours" name="hours" min="0" step="0.25" required>

                <label for="date">Date:</label>
                <input type="date" id="date" name="date" required>

                <label for="entryId">Entry ID:</label>
                <input type="text" id="entryId" name="entryId" readonly value="AUTO-GENERATED">

                <label for="status">Status:</label>
                <select id="status" name="status" required>
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>

                <label for="note">Note (optional):</label>
                <textarea id="note" name="note" rows="4" placeholder="Add a note if needed..."></textarea>

                <div class="form-actions">
                    <button type="submit">Save Entry</button>
                    <button type="button" id="cancelButton">Cancel</button>
                </div>
            </form>
        </section>
    </main>

    <script src="./js/createEntry.js"></script>
</body>
</html>
