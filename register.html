<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account</title>

  <link rel="stylesheet" href="css/register.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  >
</head>
<body>

<div class="auth-container">

  <div class="auth-card">

    <div class="logo">
      <i class="fa-regular fa-clock"></i>
    </div>

    <h2>Create Account</h2>

    <p class="subtitle">
      Start tracking your work hours, projects, and productivity today.
    </p>

    <div class="features">

      <div class="feature">
        <i class="fa-solid fa-check"></i>
        <span>Track daily work hours</span>
      </div>

      <div class="feature">
        <i class="fa-solid fa-check"></i>
        <span>Manage multiple projects</span>
      </div>

      <div class="feature">
        <i class="fa-solid fa-check"></i>
        <span>View productivity reports</span>
      </div>

    </div>

    <form id="registerForm">

      <input
        type="text"
        id="name"
        placeholder="Full Name"
        required
      >

      <input
        type="email"
        id="email"
        placeholder="Email Address"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required
      >

      <button type="submit">
        Create Account
      </button>

    </form>

    <p class="bottom-text">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>

</div>

<script src="js/register.js"></script>

</body>
</html>
