<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link rel="stylesheet" href="css/login.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  >
</head>
<body>

<div class="auth-container">

  <div class="auth-card">

    <div class="logo">
      <i class="fa-regular fa-clock"></i>
    </div>

    <h2>Welcome Back</h2>

    <p class="subtitle">
      Sign in to continue tracking your work hours and projects.
    </p>

    <form id="loginForm">

      <input
        type="email"
        id="email"
        placeholder="Email Address"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit">
        Login
      </button>

    </form>

    <p class="bottom-text">
      Don't have an account?
      <a href="register.html">Register</a>
    </p>

  </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
